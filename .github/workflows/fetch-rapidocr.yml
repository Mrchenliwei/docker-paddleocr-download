name: Fetch Stable RapidOCR Image

on:
  workflow_dispatch:

jobs:
  fetch-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Stable RapidOCR Image
        run: |
          echo "Attempting to pull witnessmenow/rapidocr-onnxruntime:latest..."
          
          # 尝试拉取 witnessmenow 的镜像 (这是一个非常稳定的 RapidOCR 封装)
          if docker pull witnessmenow/rapidocr-onnxruntime:latest; then
            echo "Successfully pulled witnessmenow image."
            docker tag witnessmenow/rapidocr-onnxruntime:latest jonathanzzh/paddleocr-http-server:latest
          else
            echo "Primary source failed. Trying alternative..."
            # 备用方案：尝试拉取基础的 onnxruntime 镜像并手动配置 (如果上面失败)
            # 这里为了简化，我们假设 witnessmenow 可用，因为它在 GitHub Actions 中通常很稳
            exit 1
          fi
          
          echo "Saving image to tarball..."
          docker save -o rapidocr-stable-x86.tar jonathanzzh/paddleocr-http-server:latest
          ls -lh rapidocr-stable-x86.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapidocr-stable-x86
          path: rapidocr-stable-x86.tar
          retention-days: 1
