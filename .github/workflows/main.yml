name: Fix PaddleOCR (x86_64 Stable)

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest # 强制使用 x86_64 环境
    steps:
      - name: Pull Correct Architecture Image
        run: |
          echo "Pulling cjh0613/paddleocr-http-server:latest (Guaranteed x86_64)..."
          docker pull cjh0613/paddleocr-http-server:latest
          
          echo "Retagging to jonathanzzh/paddleocr-http-server:latest for Dify compatibility..."
          docker tag cjh0613/paddleocr-http-server:latest jonathanzzh/paddleocr-http-server:latest
          
          echo "Saving image to tarball..."
          docker save -o paddleocr-fix.tar jonathanzzh/paddleocr-http-server:latest
          
          ls -lh paddleocr-fix.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddleocr-x86-fix
          path: paddleocr-fix.tar
          retention-days: 1
